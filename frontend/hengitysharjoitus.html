<main class="page">

  <h1>Hengitysharjoitus</h1>

  <div class="breathing-container">
    <div class="circle" id="circle"></div>
    <h2 id="instruction">Valmis?</h2>
  </div>

  <button class="primary-btn" id="startBtn">▶ Aloita harjoitus</button>

</main>

<script>
const instruction = document.getElementById("instruction");
const circle = document.getElementById("circle");
const btn = document.getElementById("startBtn");

let cycles = 0;
const maxCycles = 10;

btn.addEventListener("click", () => {
  btn.style.display = "none"; // piilota nappi
  startCountdown();
});

function startCountdown() {
  let count = 3;
  instruction.textContent = "Valmistaudu... " + count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      instruction.textContent = "Valmistaudu... " + count;
    } else {
      clearInterval(interval);
      startBreathing();
    }
  }, 1000);
}

function startBreathing() {
  cycles = 0;
  breatheIn();
}

function breatheIn() {
  instruction.textContent = "Hengitä sisään...";
  circle.style.transform = "scale(1.5)";

  setTimeout(holdBreath, 4000);
}

function holdBreath() {
  instruction.textContent = "Pidätä...";
  setTimeout(breatheOut, 4000);
}

function breatheOut() {
  instruction.textContent = "Hengitä ulos...";
  circle.style.transform = "scale(1)";

  setTimeout(() => {
    cycles++;

    if (cycles < maxCycles) {
      breatheIn();
    } else {
      finishExercise();
    }
  }, 6000);
}

function finishExercise() {
  instruction.textContent = "Hienoa! Nyt tee HRV -mittaus ja halutessasi voit täyttää oirekyselyn.";
  circle.style.transform = "scale(1)";
}
</script>
