  <main class="diary-page">
    <h2></h2>

    <div class="diary-layout">
      <div class="entry-panel">
        <button class="get_entries">Hae päiväkirjamerkinnät</button>

        <h2>Lisää päiväkirjamerkintä</h2>

        <form class="entry-form">
          <label for="entry_date">Päivämäärä:</label>
          <input id="entry_date" type="date" name="entry_date" required />

          <label for="weight">Paino:</label>
          <input
            id="weight"
            type="number"
            name="weight"
            placeholder="esim. 68.5"
            required
          />

          <label for="sleep_hours">Kuinka monta tuntia nukuit viime yönä?</label>
          <input
            id="sleep_hours"
            type="number"
            name="sleep_hours"
            placeholder="esim. 7"
            required
          />

          


          <label for="energy_level">Energiataso:</label>
          <input
            id="energy_level"
            type="number"
            name="energy_level"
            placeholder="1 = erittäin matala, 10 = erittäin hyvä"
          />



          <label for="stress_level">Stressitaso:</label>
          <input
            id="stress_level"
            type="number"
            name="stress_level"
            placeholder="1 = matala, 10 = erittäin korkea"
          />

          <label for="mood">Millainen olosi on tänään?</label>
          <input
            id="mood"
            type="text"
            name="mood"
            placeholder="esim. ahdistunut, rauhallinen, väsynyt"
            required
          />

          <label for="symptom">Onko sinulla ollut oireita?</label>
          <input
            id="symptom"
            type="text"
            name="symptom"
            placeholder="esim. ahdistus, univaikeudet, ylivireys"
          />

          <label for="medication">Käytitkö lääkitystä tänään?</label>
          <input
            id="medication"
            type="text"
            name="medication"
            placeholder="kirjoita tarvittaessa"
          />

          <label for="notes">Haluatko kirjoittaa päivästäsi tarkemmin?</label>
          <textarea
            id="notes"
            name="notes"
            placeholder="Kuvaile vointiasi, tapahtumia, mahdollisia laukaisijoita tai muita huomioita..."
          ></textarea>

          <button type="submit">Lisää merkintä</button>
        </form>
      </div>


    <section class="diary-card-area">
      <!-- Kortit luodaan JavaScriptillä -->
    </section>
  </main>

    <button autofocus>Close</button>
  </dialog>
