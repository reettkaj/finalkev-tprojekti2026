<main>

<main class="diary-page">

<h2>Päiväkirja</h2>

<div class="diary-layout">

<div class="entry-panel">

<!-- nappi joka hakee merkinnät -->
<button class="get_entries">Hae päiväkirjamerkinnät</button>

<h2>Lisää päiväkirjamerkintä</h2>

<form class="entry-form">

<input type="date" name="entry_date" required>
<input type="text" name="mood" placeholder="Mood" required>
<input type="number" name="weight" placeholder="Weight (kg)" required>
<input type="number" name="sleep_hours" placeholder="Sleep hours" required>
<input type="number" name="energy_level" placeholder="Energy level (1-10)">
<input type="number" step="0.1" name="water_liters" placeholder="Water (liters)">
<input type="number" name="stress_level" placeholder="Stress level (1-10)">
<input type="text" name="exercise" placeholder="Exercise">
<input type="text" name="meal" placeholder="Meal">
<input type="text" name="symptom" placeholder="Symptoms">
<input type="text" name="medication" placeholder="Medication">
<textarea name="notes" placeholder="Notes"></textarea>

<button type="submit">Lisää merkintä</button>

</form>
</div>

<!-- Flexbox pohja johon kortit luodaan -->
<section class="diary-card-area">
<!-- Kortit luodaan JavaScriptillä -->
</section>
</main>
<footer>
<p>Copyright, RK</p>
</footer>

<!-- Dialogi joka avautuu kun painetaan kortin "Avaa" -->
<dialog class="diary_dialog">

<h2>Päiväkirjamerkintä</h2>
<p>Tiedot:</p>
<div class="diary_id">ID</div>
<button autofocus>Close</button>
</dialog>
<script type="module" src="js/login.js"></script>
</body>
