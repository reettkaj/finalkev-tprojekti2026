 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="On tärkeää että pidät huolta itsestäsi. Seuraa treeniohjeitamme, tarkastele terveyttäsi
      HRV tiedon avulla ja voi kokonaisvaltaisesti hyvin. Suuntaa nyt hyvinvointia ja uutta
      elämääsi kohti."
    />
    <link rel="stylesheet" href="/css/style.css">
    <title>PTSD- ja hyvinvointiseurantasovellus</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;1,300&family=Roboto+Slab:wght@100;200;300;400;500;600;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="content-container">

    <div class="PatientloginForm">
      <form class="PatientloginForm">
        <label for="email">Sähköposti</label>
        <input type="email" name="email" placeholder="esimerkki@sähköposti.fi" />
        <label for="password">Salasana</label>
        <input type="password" name="password" placeholder="salasana" />
        <input name="submit" type="submit" value="Kirjaudu sisään" class="Patientloginform"/>
      </form>
      <button id="showProfessionalLogin">Kirjaudu sisään ammattilaisena</button>
    </div>

    <div class="ProfessionalLoginForm hidden">
      <form class="ProfessionalLoginForm">
        <label for="email">Sähköposti</label>
        <input type="email" name="email" placeholder="esimerkki@sähköposti.fi" />
        <label for="password">Salasana</label>
        <input type="password" name="password" placeholder="salasana" />
        <input name="submit" type="submit" value="Kirjaudu sisään" class="ProfessionalLoginform"/>
      </form>
      <button id="showPatientLogin">Kirjaudu sisään potilaana</button>
    </div>
  </div>
  </body>
  <script type="module" src="src/js/main.js"></script>
</html>
